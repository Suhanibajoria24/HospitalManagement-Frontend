<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Patient</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f0f4f8;
            --card: #ffffff;
            --primary: #0a6e6e;
            --accent: #12b886;
            --text: #1a202c;
            --muted: #718096;
            --border: #e2e8f0;
            --shadow: 0 4px 24px rgba(0,0,0,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 48px 16px;
        }

        .container { width: 100%; max-width: 600px; }

        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-end; 
            margin-bottom: 28px; 
        }

        .header-text h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 2.2rem;
            color: var(--primary);
            letter-spacing: -0.5px;
        }

        .header-text p { color: var(--muted); margin-top: 4px; font-size: 0.95rem; }

        .btn-back {
            padding: 10px 18px;
            background: var(--card);
            color: var(--muted);
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            box-shadow: var(--shadow);
        }

        .btn-back:hover { border-color: var(--primary); color: var(--primary); }

        .ssn-badge {
            display: inline-block;
            background: #e6f4f4;
            color: var(--primary);
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 20px;
        }

        /* ── Form Card ── */
        .form-card { 
            background: var(--card); 
            border-radius: 16px; 
            box-shadow: var(--shadow); 
            padding: 32px;
        }

        .form-group { margin-bottom: 20px; }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            color: var(--text);
            outline: none;
            transition: all 0.2s;
        }

        .form-group input:focus { 
            border-color: var(--primary); 
            background: #f7fffe;
        }

        .form-group input::placeholder { color: #cbd5e0; }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
            margin-top: 10px;
            box-shadow: 0 4px 12px rgba(18, 184, 134, 0.2);
        }

        .btn-submit:hover { 
            background: #0ca678; 
            transform: translateY(-1px); 
        }

        .hint {
            font-size: 0.85rem;
            color: var(--muted);
            text-align: center;
            margin-top: 16px;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="header">
        <div class="header-text">
            <h1>Edit Profile</h1>
            <p>Update patient information details</p>
        </div>
        <a th:href="@{/patients}" class="btn-back">← Back</a>
    </div>

    <div class="ssn-badge">
        PATIENT SSN: <span th:text="${ssn}"></span>
    </div>

    <div class="form-card">
        <form th:action="@{/patients/update/{ssn}(ssn=${ssn})}" method="post">

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" th:value="${patientUpdateDto.name}" placeholder="Enter patient name"/>
            </div>

            <div class="form-group">
                <label>Residential Address</label>
                <input type="text" name="address" th:value="${patientUpdateDto.address}" placeholder="Enter street address"/>
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" name="phone" th:value="${patientUpdateDto.phone}" placeholder="Enter 10-digit phone"/>
            </div>

            <div class="form-group">
                <label>Insurance ID</label>
                <input type="number" name="insuranceID" th:value="${patientUpdateDto.insuranceID}" placeholder="Enter insurance policy number"/>
            </div>

            <div class="form-group">
                <label>PCP Physician ID</label>
                <input type="number" name="pcpId" placeholder="Employee ID (Leave blank to keep current)"/>
            </div>

            <button type="submit" class="btn-submit">Save Changes</button>
            
            <p class="hint">Leave any field blank to retain existing data.</p>
        </form>
    </div>

</div>

</body>
</html>
