<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Patient</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
            margin: 0;
        }

        .container {
            width: 50%;
            margin: 40px auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h2 {
            color: #333;
            margin: 0;
        }

        .form-container {
            background: #fff;
            padding: 30px;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: bold;
            color: #444;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            font-size: 14px;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus {
            border-color: #007bff;
            box-shadow: 0 0 0 3px rgba(0,123,255,0.15);
        }

        .btn {
            padding: 9px 20px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            border: none;
        }

        .btn-submit {
            background-color: #28a745;
            color: white;
            width: 100%;
            margin-top: 8px;
        }

        .btn-submit:hover { background-color: #1e7e34; }

        .btn-back {
            background-color: #6c757d;
            color: white;
        }

        .btn-back:hover { background-color: #545b62; }

        /* Error/Success messages */
        .alert {
            padding: 12px 16px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="header">
        <h2>Add Patient</h2>
        <a th:href="@{/patients}" class="btn btn-back">← Back</a>
    </div>

    <!-- Success / Error Messages -->
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}"   class="alert alert-error"   th:text="${errorMessage}"></div>

    <div class="form-container">
        <form th:action="@{/patients/add}" method="post">

            <div class="form-group">
                <label for="ssn">SSN</label>
                <input type="number" id="ssn" name="ssn" placeholder="Enter SSN" required/>
            </div>

            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Enter patient name" required/>
            </div>

            <div class="form-group">
                <label for="address">Address</label>
                <input type="text" id="address" name="address" placeholder="Enter address" required/>
            </div>

            <div class="form-group">
                <label for="phone">Phone</label>
                <input type="text" id="phone" name="phone" placeholder="Enter 10-digit phone" required/>
            </div>

            <div class="form-group">
                <label for="insuranceID">Insurance ID</label>
                <input type="number" id="insuranceID" name="insuranceID" placeholder="Enter insurance ID" required/>
            </div>

            <div class="form-group">
                <label for="pcpId">PCP Physician ID</label>
                <input type="number" id="pcpId" name="pcpId" placeholder="Enter physician employee ID" required/>
            </div>

            <button type="submit" class="btn btn-submit">+ Add Patient</button>

        </form>
    </div>

</div>

</body>
</html>
