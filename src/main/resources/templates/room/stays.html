<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Stays for Room [[${roomNumber}]]</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        .font-serif-dm { font-family: 'DM Serif Display', serif; }
        body { font-family: 'DM Sans', sans-serif; background: #f0f4f8; color: #1a202c; }
    </style>
</head>
<body class="min-h-screen py-10 flex flex-col items-center px-4">
    
    <div class="w-full max-w-[960px] mb-6 flex items-center justify-between">
        <!-- Breadcrumb -->
        <div class="flex items-center text-[0.95rem] font-medium text-[#718096]">
            <a href="/" class="hover:text-[#0a6e6e] transition-colors flex items-center gap-1.5">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                </svg>
                Home
            </a>
            <span class="mx-2 text-[#cbd5e0]">/</span>
            <a href="/rooms/General" class="hover:text-[#0a6e6e] transition-colors">Rooms</a>
            <span class="mx-2 text-[#cbd5e0]">/</span>
            <span class="text-[#1a202c] drop-shadow-sm">Room [[${roomNumber}]] Stays</span>
        </div>
        
        <a href="javascript:history.back()" class="inline-flex items-center text-[#718096] bg-white border-2 border-[#e2e8f0] rounded-[10px] px-[18px] py-2 text-[0.95rem] hover:text-[#0a6e6e] hover:border-[#0a6e6e] transition-colors shadow-[0_4px_24px_rgba(0,0,0,0.08)] font-medium">&larr; Go Back</a>
    </div>

    <div class="w-full max-w-[960px] mb-8 flex flex-col items-center text-center">
        <h1 class="text-[2.4rem] tracking-[-0.5px] mb-1.5 text-[#0a6e6e] font-serif-dm flex flex-wrap items-center justify-center gap-3">
            Stay History of Room Number 
            <span class="inline-block bg-[#e6f9f3] text-[#12b886] px-4 py-1.5 rounded-[20px] text-[1.6rem] font-bold align-middle">[[${roomNumber}]]</span>
        </h1>
        <p class="text-[#718096] text-[0.95rem] font-light mt-1">Past and active stays associated with this room</p>
    </div>

    <div class="w-full max-w-[960px]">
        <div class="bg-white rounded-2xl shadow-[0_4px_24px_rgba(0,0,0,0.08)] overflow-hidden">
            
            <div th:if="${#lists.isEmpty(stays)}" class="text-center py-16 text-[#718096]">
                <p>No stays documented for this room.</p>
            </div>

            <table th:unless="${#lists.isEmpty(stays)}" class="w-full border-collapse">
                <thead class="bg-[#0a6e6e] text-white">
                    <tr>
                        <th class="py-4 px-6 font-medium text-[0.85rem] tracking-[0.08em] uppercase border-b-0 text-center">Sr No</th>
                        <th class="py-4 px-6 font-medium text-[0.85rem] tracking-[0.08em] uppercase border-b-0 text-center">Patient Name</th>
                        <th class="py-4 px-6 font-medium text-[0.85rem] tracking-[0.08em] uppercase border-b-0 text-center">Check In</th>
                        <th class="py-4 px-6 font-medium text-[0.85rem] tracking-[0.08em] uppercase border-b-0 text-center">Check Out</th>
                        <th class="py-4 px-6 font-medium text-[0.85rem] tracking-[0.08em] uppercase border-b-0 text-center">Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="stay, stat : ${stays}" 
                        class="border-b border-[#e2e8f0] hover:bg-[#f7fffe] transition-colors last:border-b-0">
                        <td class="py-3 px-6 text-[0.97rem] align-middle text-center" th:text="${stat.index + 1}">1</td>
                        <td class="py-3 px-6 text-[0.97rem] align-middle font-medium text-center" th:text="${stay.patientName}">John Doe</td>
                        <td class="py-3 px-6 text-[0.97rem] align-middle text-[#4a5568] text-center" th:text="${#strings.substring(stay.stayStart, 0, 10)}">2023-10-01</td>
                        <td class="py-3 px-6 text-[0.97rem] align-middle text-[#4a5568] text-center" th:text="${#strings.substring(stay.stayEnd, 0, 10)}">2023-10-05</td>
                        <td class="py-3 px-6 align-middle text-center">
                            <span th:class="${stay.status == 'Completed' ? 'inline-block bg-[#e6f9f3] text-[#12b886] px-3 py-1 rounded-[20px] text-[0.88rem] font-medium' : 'inline-block bg-[#ebf8ff] text-[#3182ce] px-3 py-1 rounded-[20px] text-[0.88rem] font-medium'}"
                                  th:text="${stay.status}">Completed</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
