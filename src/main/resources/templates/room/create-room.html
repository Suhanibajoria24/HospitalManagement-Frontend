<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create New Room</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        .font-serif-dm { font-family: 'DM Serif Display', serif; }
        body { font-family: 'DM Sans', sans-serif; background: #f0f4f8; color: #1a202c; }
    </style>
</head>
<body class="min-h-screen py-10 flex flex-col items-center justify-center px-4">

    <!-- Breadcrumb -->
    <div class="w-full max-w-[600px] mb-4 flex items-center text-[0.95rem] font-medium text-[#718096]">
        <a href="/" class="hover:text-[#0a6e6e] transition-colors flex items-center gap-1.5">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
            </svg>
            Home
        </a>
        <span class="mx-2 text-[#cbd5e0]">/</span>
        <a href="/rooms/General" class="hover:text-[#0a6e6e] transition-colors">Rooms</a>
        <span class="mx-2 text-[#cbd5e0]">/</span>
        <span class="text-[#1a202c] drop-shadow-sm">Add Room</span>
    </div>

    <!-- Alert Success Mapping -->
    <div th:if="${popupMessage != null}" class="w-full max-w-[600px] mb-5 text-[0.88rem] font-medium flex items-center gap-2 rounded-[10px] py-2.5 px-[18px]"
         th:classappend="${popupType == 'success'} ? 'bg-[#e6f9f3] text-[#0a6e6e] border border-[#12b886]' : 'bg-[#fff5f5] text-[#e53e3e] border border-[#fc8181]'">
        <span th:text="${popupType == 'success' ? '✅' : '❌'}"></span> <span th:text="${popupMessage}"></span>
    </div>

    <!-- Redirect script if success -->
    <script th:if="${popupType == 'success'}" th:inline="javascript">
        var rType = /*[[${room != null ? room.roomType : 'General'}]]*/ 'General';
        setTimeout(function() {
            window.location.href = '/rooms/' + rType;
        }, 1200);
    </script>

    <div class="w-full max-w-[600px] bg-white rounded-2xl p-10 shadow-[0_4px_24px_rgba(0,0,0,0.08)]">
        
        <div class="mb-8 text-center">
            <h1 class="text-[2.4rem] tracking-[-0.5px] mb-1.5 text-[#0a6e6e] font-serif-dm">Create Room</h1>
            <p class="text-[#718096] text-[0.95rem] font-light mt-1">Fill out the procedural details to initialize a new room</p>
        </div>

        <form th:action="@{/rooms/new}" th:object="${room}" method="post" class="space-y-6">
            
            <div class="flex flex-col gap-1.5">
                <label for="roomNumber" class="text-[0.95rem] text-[#1a202c]">Room Number</label>
                <input type="number" id="roomNumber" th:field="*{roomNumber}" placeholder="e.g. 101" required
                       class="w-full bg-white border-2 border-[#e2e8f0] text-[#1a202c] px-5 py-3 rounded-[10px] text-[0.95rem] focus:outline-none focus:border-[#0a6e6e] transition-all shadow-[0_4px_24px_rgba(0,0,0,0.08)]">
            </div>

            <div class="flex flex-col gap-1.5">
                <label for="roomType" class="text-[0.95rem] text-[#1a202c]">Room Type</label>
                <select id="roomType" th:field="*{roomType}" required
                        class="w-full bg-white border-2 border-[#e2e8f0] text-[#1a202c] px-5 py-3 rounded-[10px] text-[0.95rem] focus:outline-none focus:border-[#0a6e6e] transition-all shadow-[0_4px_24px_rgba(0,0,0,0.08)] cursor-pointer">
                    <option value="General">General</option>
                    <option value="ICU">ICU</option>
                    <option value="Private">Private</option>
                    <option value="Single">Single</option>
                </select>
            </div>

            <div class="flex gap-4">
                <div class="flex-1 flex flex-col gap-1.5">
                    <label for="blockFloor" class="text-[0.95rem] text-[#1a202c]">Floor</label>
                    <input type="number" id="blockFloor" th:field="*{blockFloor}" placeholder="e.g. 1" required
                           class="w-full bg-white border-2 border-[#e2e8f0] text-[#1a202c] px-5 py-3 rounded-[10px] text-[0.95rem] focus:outline-none focus:border-[#0a6e6e] transition-all shadow-[0_4px_24px_rgba(0,0,0,0.08)]">
                </div>
                
                <div class="flex-1 flex flex-col gap-1.5">
                    <label for="blockCode" class="text-[0.95rem] text-[#1a202c]">Block Code</label>
                    <input type="number" id="blockCode" th:field="*{blockCode}" placeholder="e.g. 101" required
                           class="w-full bg-white border-2 border-[#e2e8f0] text-[#1a202c] px-5 py-3 rounded-[10px] text-[0.95rem] focus:outline-none focus:border-[#0a6e6e] transition-all shadow-[0_4px_24px_rgba(0,0,0,0.08)]">
                </div>
            </div>

            <div class="flex items-center gap-3 pt-2">
                <input type="checkbox" id="unavailable" th:field="*{unavailable}"
                       class="w-[18px] h-[18px] text-[#0a6e6e] border-[#e2e8f0] rounded focus:ring-0 cursor-pointer accent-[#0a6e6e]">
                <label for="unavailable" class="cursor-pointer m-0 text-[#1a202c] font-medium text-[0.95rem]">Mark as initially occupied (unavailable)</label>
            </div>

            <div class="pt-4">
                <button type="submit" class="w-full bg-[#0a6e6e] hover:bg-[#085a5a] text-white font-medium py-3.5 px-6 rounded-[10px] text-[0.95rem] transition-colors shadow-[0_4px_24px_rgba(0,0,0,0.08)] hover:-translate-y-[1px] flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                    </svg>
                    Initialize Room
                </button>
            </div>
        </form>

        <div class="text-center mt-6">
            <a href="/rooms/General" class="inline-flex items-center text-[#718096] bg-white border-2 border-[#e2e8f0] rounded-[10px] px-[18px] py-3 text-[0.95rem] hover:text-[#0a6e6e] hover:border-[#0a6e6e] transition-colors shadow-[0_4px_24px_rgba(0,0,0,0.08)] font-medium">
                &larr; Back to catalog
            </a>
        </div>
    </div>
</body>
</html>
